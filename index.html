<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woordjes Leren 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef6e4;
    --surface: #ffffff;
    --primary: #f582ae;
    --primary-dark: #d44e81;
    --secondary: #8bd3dd;
    --accent: #ffd166;
    --success: #06d6a0;
    --danger: #ef476f;
    --text: #1a1a2e;
    --text-light: #555577;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); overflow-x: hidden; }
  body::before, body::after { content:''; position:fixed; border-radius:50%; z-index:0; pointer-events:none; }
  body::before { width:400px;height:400px; background:radial-gradient(circle,#f582ae33,transparent 70%); top:-100px;left:-100px; }
  body::after { width:350px;height:350px; background:radial-gradient(circle,#8bd3dd33,transparent 70%); bottom:-80px;right:-80px; }

  #app { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:20px; }

  /* HEADER */
  header { text-align:center; padding:28px 20px 16px; position:relative; }
  header h1 { font-family:'Baloo 2',cursive; font-size:2.6rem; font-weight:800; background:linear-gradient(135deg,var(--primary-dark),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  header p { color:var(--text-light); font-size:1rem; margin-top:4px; }
  .parent-btn { position:absolute; top:28px; right:0; background:var(--surface); border:2px solid #e0e0e0; border-radius:50px; padding:8px 16px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.82rem; cursor:pointer; color:var(--text-light); transition:all 0.2s; box-shadow:var(--shadow); }
  .parent-btn:hover { border-color:var(--primary); color:var(--primary-dark); }

  /* STATS BAR */
  .stats-bar { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
  .stat-chip { background:var(--surface); border-radius:50px; padding:8px 18px; font-size:0.85rem; font-weight:700; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .dot-total { background:var(--secondary); }
  .dot-learned { background:var(--success); }
  .dot-mistakes { background:var(--danger); }

  /* MODE SELECTOR */
  .mode-selector { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:28px; }
  .mode-btn { background:var(--surface); border:3px solid transparent; border-radius:var(--radius); padding:18px 12px; cursor:pointer; text-align:center; transition:all 0.2s; box-shadow:var(--shadow); font-family:'Nunito',sans-serif; }
  .mode-btn:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(0,0,0,0.15); }
  .mode-btn.active { border-color:var(--primary); background:#fff0f6; }
  .mode-btn .mode-icon { font-size:2rem; display:block; margin-bottom:6px; }
  .mode-btn .mode-name { font-weight:800; font-size:0.92rem; color:var(--text); }
  .mode-btn .mode-desc { font-size:0.73rem; color:var(--text-light); margin-top:3px; }

  /* FILTER BAR */
  .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-bar label { font-weight:700; font-size:0.9rem; }
  .filter-toggle { background:var(--surface); border:2px solid var(--secondary); border-radius:50px; padding:6px 16px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.2s; color:var(--text); }
  .filter-toggle.active { background:var(--secondary); color:white; border-color:var(--secondary); }

  /* GAME AREA */
  .game-area { min-height:420px; }

  /* FLASHCARD */
  .flashcard-wrap { perspective:1200px; cursor:pointer; max-width:540px; margin:0 auto 24px; }
  .flashcard { width:100%; min-height:240px; position:relative; transform-style:preserve-3d; transition:transform 0.55s cubic-bezier(0.4,0,0.2,1); border-radius:var(--radius); }
  .flashcard.flipped { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 36px; backface-visibility:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.12); text-align:center; }
  .card-front { background:linear-gradient(135deg,#fff0f6,#fce4ec); border:3px solid #f9c3d8; }
  .card-back { background:linear-gradient(135deg,#e0f7f4,#b2ebf2); border:3px solid #80d8d0; transform:rotateY(180deg); }
  .card-label { font-size:0.72rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:14px; }
  .card-word { font-family:'Baloo 2',cursive; font-size:1.9rem; font-weight:800; color:var(--text); line-height:1.2; }
  .card-def { font-size:1rem; color:var(--text); line-height:1.6; font-weight:600; }
  .card-hint { font-size:0.8rem; color:var(--text-light); margin-top:12px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  .flashcard-nav { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:14px; }
  .nav-btn { background:var(--surface); border:2px solid #e0e0e0; border-radius:50%; width:46px; height:46px; font-size:1.2rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .nav-btn:hover { background:var(--primary); border-color:var(--primary); color:white; }
  .nav-btn:disabled { opacity:0.3; cursor:default; }
  .card-counter { font-weight:800; font-size:1rem; color:var(--text-light); min-width:80px; text-align:center; }
  .flashcard-actions { display:flex; justify-content:center; gap:12px; margin-top:8px; }
  .action-btn { padding:10px 22px; border-radius:50px; border:none; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem; cursor:pointer; transition:all 0.2s; box-shadow:var(--shadow); }
  .action-btn:hover { transform:translateY(-2px); }
  .btn-wrong { background:#ffe0e6; color:var(--danger); }
  .btn-right { background:#d0f8ef; color:#00876a; }
  .btn-primary { background:var(--primary); color:white; }
  .btn-secondary { background:var(--secondary); color:white; }
  .btn-dark { background:var(--text); color:white; }

  /* PROGRESS */
  .progress-wrap { background:#e8e8e8; border-radius:50px; height:10px; margin-bottom:20px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:50px; transition:width 0.4s ease; }

  /* QUIZ */
  .quiz-question { background:var(--surface); border-radius:var(--radius); padding:28px 32px; text-align:center; box-shadow:var(--shadow); margin-bottom:18px; border:3px solid #f0e0f8; }
  .quiz-question .q-label { font-size:0.72rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:10px; }
  .quiz-question .q-text { font-size:1.1rem; font-weight:600; color:var(--text); line-height:1.6; }
  .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .option-btn { background:var(--surface); border:3px solid #e0e0e0; border-radius:14px; padding:14px 12px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; transition:all 0.2s; text-align:left; line-height:1.4; color:var(--text); }
  .option-btn:hover:not(:disabled) { border-color:var(--primary); background:#fff0f6; }
  .option-btn.correct { border-color:var(--success); background:#d0f8ef; color:#00512e; animation:popIn 0.3s; }
  .option-btn.wrong { border-color:var(--danger); background:#ffe0e6; color:#8b0022; animation:shake 0.4s; }
  .option-btn:disabled { cursor:default; }
  @keyframes popIn { 0%{transform:scale(0.95)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* MATCH */
  .matching-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .match-col { display:flex; flex-direction:column; gap:10px; }
  .match-item { background:var(--surface); border:3px solid #e0e0e0; border-radius:14px; padding:12px 14px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.2s; line-height:1.4; color:var(--text); text-align:center; min-height:58px; display:flex; align-items:center; justify-content:center; }
  .match-item.word-item { background:linear-gradient(135deg,#fff0f6,#fce4ec); border-color:#f9c3d8; font-family:'Baloo 2',cursive; font-size:0.95rem; }
  .match-item.def-item { background:linear-gradient(135deg,#f0f4ff,#e8ecff); border-color:#c5cff8; font-size:0.77rem; font-weight:600; }
  .match-item.selected { border-color:var(--primary); background:#ffd6e7; transform:scale(1.03); }
  .match-item.matched { border-color:var(--success); background:#d0f8ef; cursor:default; opacity:0.7; }
  .match-item.wrong-match { border-color:var(--danger); background:#ffe0e6; animation:shake 0.4s; }

  /* TYPE */
  .type-input-wrap { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .type-input { flex:1; min-width:200px; padding:13px 18px; border:3px solid #e0e0e0; border-radius:50px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; color:var(--text); background:var(--surface); outline:none; transition:border-color 0.2s; }
  .type-input:focus { border-color:var(--primary); }
  .type-input.correct-input { border-color:var(--success); background:#d0f8ef; }
  .type-input.wrong-input { border-color:var(--danger); background:#ffe0e6; }
  .type-submit { background:var(--primary); color:white; border:none; border-radius:50px; padding:13px 26px; font-family:'Nunito',sans-serif; font-weight:800; font-size:1rem; cursor:pointer; transition:all 0.2s; box-shadow:var(--shadow); }
  .type-submit:hover { background:var(--primary-dark); }
  .type-submit:disabled { opacity:0.5; cursor:default; }

  /* RESULT */
  .result-screen { text-align:center; padding:36px 20px; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); }
  .result-screen .trophy { font-size:4.5rem; margin-bottom:14px; }
  .result-screen h2 { font-family:'Baloo 2',cursive; font-size:1.9rem; margin-bottom:6px; }
  .result-screen .score-big { font-size:2.8rem; font-weight:900; color:var(--primary-dark); }
  .result-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }

  /* EMPTY */
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
  .empty-state .big-emoji { font-size:4rem; margin-bottom:14px; }
  .empty-state h3 { font-family:'Baloo 2',cursive; font-size:1.5rem; color:var(--text); margin-bottom:8px; }

  .section-label { font-size:0.78rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:10px; }
  .mistakes-badge { display:inline-flex; align-items:center; background:var(--danger); color:white; border-radius:50px; padding:2px 8px; font-size:0.75rem; font-weight:800; margin-left:6px; }

  /* ====== PARENT DASHBOARD ====== */
  #parent-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(10,10,30,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
  #parent-overlay.show { display:flex; }
  .parent-panel { background:var(--bg); border-radius:28px; width:min(820px,96vw); max-height:90vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,0.35); position:relative; }
  .parent-header { background:linear-gradient(135deg,var(--primary-dark),#7b5ea7); padding:28px 32px 20px; border-radius:28px 28px 0 0; color:white; }
  .parent-header h2 { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; }
  .parent-header p { opacity:0.85; font-size:0.9rem; margin-top:4px; }
  .parent-close { position:absolute; top:20px; right:24px; background:rgba(255,255,255,0.2); border:none; border-radius:50%; width:38px; height:38px; color:white; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
  .parent-close:hover { background:rgba(255,255,255,0.35); }
  .parent-body { padding:28px 32px; }

  /* PIN screen */
  .pin-screen { text-align:center; padding:20px 0; }
  .pin-screen h3 { font-family:'Baloo 2',cursive; font-size:1.4rem; margin-bottom:8px; }
  .pin-screen p { color:var(--text-light); font-size:0.9rem; margin-bottom:24px; }
  .pin-dots { display:flex; gap:12px; justify-content:center; margin-bottom:24px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; border:3px solid #ccc; transition:all 0.2s; }
  .pin-dot.filled { background:var(--primary); border-color:var(--primary); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:240px; margin:0 auto; }
  .pin-key { background:var(--surface); border:2px solid #e0e0e0; border-radius:14px; padding:16px; font-family:'Baloo 2',cursive; font-size:1.4rem; font-weight:700; cursor:pointer; transition:all 0.15s; box-shadow:var(--shadow); color:var(--text); }
  .pin-key:hover { background:var(--primary); color:white; border-color:var(--primary); transform:scale(1.05); }
  .pin-key.del { font-size:1rem; font-family:'Nunito',sans-serif; }
  .pin-error { color:var(--danger); font-weight:700; font-size:0.9rem; margin-top:10px; animation:shake 0.4s; }
  .pin-note { color:var(--text-light); font-size:0.78rem; margin-top:16px; }

  /* Dashboard cards */
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
  .dash-card { background:var(--surface); border-radius:18px; padding:20px 16px; text-align:center; box-shadow:var(--shadow); }
  .dash-card .dc-val { font-family:'Baloo 2',cursive; font-size:2.2rem; font-weight:800; }
  .dash-card .dc-label { font-size:0.78rem; font-weight:700; color:var(--text-light); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
  .dash-card.green .dc-val { color:var(--success); }
  .dash-card.red .dc-val { color:var(--danger); }
  .dash-card.blue .dc-val { color:#5c6bc0; }
  .dash-card.orange .dc-val { color:#f57c00; }

  /* Sessions */
  .dash-section-title { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; margin-bottom:12px; color:var(--text); display:flex; align-items:center; gap:8px; }
  .sessions-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
  .session-row { background:var(--surface); border-radius:14px; padding:14px 18px; box-shadow:0 2px 8px rgba(0,0,0,0.07); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .session-mode-badge { border-radius:50px; padding:4px 12px; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; flex-shrink:0; }
  .badge-flashcard { background:#ffe0f0; color:var(--primary-dark); }
  .badge-quiz { background:#e8e4ff; color:#5c35c9; }
  .badge-type { background:#fff3cd; color:#a66000; }
  .badge-match { background:#d0f4ff; color:#0077a8; }
  .badge-mistakes { background:#ffe0e6; color:var(--danger); }
  .session-info { flex:1; }
  .session-info .si-time { font-size:0.78rem; color:var(--text-light); font-weight:600; }
  .session-info .si-score { font-weight:800; font-size:0.95rem; }
  .session-score-bar { flex:0 0 80px; height:8px; background:#e8e8e8; border-radius:50px; overflow:hidden; }
  .session-score-fill { height:100%; border-radius:50px; background:linear-gradient(90deg,var(--success),#a8edcc); }

  /* Word table */
  .word-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .word-table th { background:#f0f0f8; padding:10px 14px; text-align:left; font-weight:800; color:var(--text-light); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; }
  .word-table td { padding:10px 14px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
  .word-table tr:hover td { background:#fafafa; }
  .wt-word { font-family:'Baloo 2',cursive; font-weight:700; font-size:0.95rem; }
  .wt-bar-wrap { width:80px; height:8px; background:#e8e8e8; border-radius:50px; overflow:hidden; display:inline-block; }
  .wt-bar { height:100%; border-radius:50px; }
  .wt-status { font-size:0.75rem; font-weight:800; padding:3px 10px; border-radius:50px; }
  .status-ok { background:#d0f8ef; color:#00512e; }
  .status-hard { background:#ffe0e6; color:#8b0022; }
  .status-new { background:#f0f0f0; color:#888; }

  /* Tabs */
  .dash-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .dash-tab { background:var(--surface); border:2px solid #e0e0e0; border-radius:50px; padding:7px 18px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.82rem; cursor:pointer; color:var(--text-light); transition:all 0.2s; }
  .dash-tab.active { background:var(--primary); border-color:var(--primary); color:white; }
  .dash-tab:hover:not(.active) { border-color:var(--primary); color:var(--primary-dark); }

  .dash-reset { background:#fff0f0; border:2px solid #ffc5c5; border-radius:50px; padding:7px 16px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.8rem; cursor:pointer; color:var(--danger); transition:all 0.2s; margin-left:auto; }
  .dash-reset:hover { background:var(--danger); color:white; }

  @media(max-width:600px){
    header h1{font-size:2rem;} .parent-body{padding:20px 16px;} .quiz-options{grid-template-columns:1fr;} .matching-grid{grid-template-columns:1fr 1fr;} .match-item{font-size:0.73rem;padding:9px;} .card-word{font-size:1.5rem;} .mode-selector{grid-template-columns:1fr 1fr;} .pin-pad{max-width:200px;} .parent-btn{font-size:0.72rem;padding:6px 10px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📚 Woordjes Leren</h1>
    <p>Theater & Film — Groep 6</p>
    <button class="parent-btn" onclick="openParent()">👨‍👩‍👧 Ouder dashboard</button>
  </header>

  <div class="stats-bar">
    <div class="stat-chip"><span class="dot dot-total"></span><span id="stat-total">0</span> woordjes</div>
    <div class="stat-chip"><span class="dot dot-learned"></span><span id="stat-learned">0</span> geleerd</div>
    <div class="stat-chip"><span class="dot dot-mistakes"></span><span id="stat-mistakes">0</span> fout</div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" onclick="switchMode('flashcard')" id="btn-flashcard">
      <span class="mode-icon">🃏</span><span class="mode-name">Flashcards</span><span class="mode-desc">Omdraaien & onthouden</span>
    </button>
    <button class="mode-btn" onclick="switchMode('quiz')" id="btn-quiz">
      <span class="mode-icon">🧠</span><span class="mode-name">Quiz</span><span class="mode-desc">Kies het juiste woord</span>
    </button>
    <button class="mode-btn" onclick="switchMode('type')" id="btn-type">
      <span class="mode-icon">✍️</span><span class="mode-name">Typ het woord</span><span class="mode-desc">Schrijf het antwoord</span>
    </button>
    <button class="mode-btn" onclick="switchMode('match')" id="btn-match">
      <span class="mode-icon">🧩</span><span class="mode-name">Koppelen</span><span class="mode-desc">Woord aan definitie</span>
    </button>
    <button class="mode-btn" onclick="switchMode('mistakes')" id="btn-mistakes">
      <span class="mode-icon">🔁</span>
      <span class="mode-name">Foute woorden <span class="mistakes-badge" id="mistakes-count-badge">0</span></span>
      <span class="mode-desc">Oefen je fouten opnieuw</span>
    </button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <label>Oefenen:</label>
    <button class="filter-toggle active" onclick="setFilter('all',this)">Alle woordjes</button>
    <button class="filter-toggle" onclick="setFilter('mistakes',this)">Alleen foute</button>
  </div>

  <div class="game-area" id="game-area"></div>
</div>

<!-- PARENT OVERLAY -->
<div id="parent-overlay">
  <div class="parent-panel">
    <div class="parent-header">
      <h2>👨‍👩‍👧 Ouder Dashboard</h2>
      <p>Voortgang van je dochter bij het leren van woordjes</p>
      <button class="parent-close" onclick="closeParent()">✕</button>
    </div>
    <div class="parent-body" id="parent-body"></div>
  </div>
</div>

<script>
const WORDS = [
  ["aanraden","Iemand de raad geven iets wel te doen."],
  ["afraden","Iemand de raad geven iets niet te doen."],
  ["het geluidseffect","Een bijzonder geluid dat te horen is in een voorstelling."],
  ["de kritiek","Zeggen wat er niet goed is aan wat iemand doet."],
  ["lovend","Aanprijzend, met complimenten."],
  ["negatief","Gezegd van iemand die afkeurende kritiek heeft."],
  ["noteren","Opschrijven, aantekenen."],
  ["de pers","De journalisten en de krant, radio of de televisie waar ze voor schrijven."],
  ["het personage","Een persoon die in een boek, toneelstuk of film voorkomt."],

const PIN = "1234"; // ← verander dit naar jouw pincode

// State
let mistakes = new Set(JSON.parse(localStorage.getItem('wl_mistakes')||'[]'));
let learned  = new Set(JSON.parse(localStorage.getItem('wl_learned')||'[]'));
let wordStats = JSON.parse(localStorage.getItem('wl_wordstats')||'{}');
  // wordStats[word] = { correct: N, wrong: N }
let sessions  = JSON.parse(localStorage.getItem('wl_sessions')||'[]');
  // sessions: [{ts, mode, score, total, duration}]

let currentMode='flashcard', filterMode='all';
let currentDeck=[], currentIdx=0, quizScore=0, quizTotal=0;
let matchSelected=null, matchPairs=[], matchDone=0;
let typeDeck=[], typeIdx=0, typeScore=0;
let sessionStart=Date.now();

function getActiveDeck(){
  return filterMode==='mistakes' ? WORDS.filter(w=>mistakes.has(w[0])) : WORDS;
}

function recordWordResult(word, correct){
  if(!wordStats[word]) wordStats[word]={correct:0,wrong:0};
  if(correct) wordStats[word].correct++; else wordStats[word].wrong++;
  localStorage.setItem('wl_wordstats', JSON.stringify(wordStats));
}

function recordSession(mode, score, total){
  const s = { ts: Date.now(), mode, score, total, duration: Math.round((Date.now()-sessionStart)/1000) };
  sessions.unshift(s);
  if(sessions.length>50) sessions=sessions.slice(0,50);
  localStorage.setItem('wl_sessions', JSON.stringify(sessions));
  sessionStart=Date.now();
}

function saveState(){
  localStorage.setItem('wl_mistakes', JSON.stringify([...mistakes]));
  localStorage.setItem('wl_learned',  JSON.stringify([...learned]));
  updateStats();
}

function updateStats(){
  document.getElementById('stat-total').textContent=WORDS.length;
  document.getElementById('stat-learned').textContent=learned.size;
  document.getElementById('stat-mistakes').textContent=mistakes.size;
  document.getElementById('mistakes-count-badge').textContent=mistakes.size;
}

function setFilter(f,el){
  filterMode=f;
  document.querySelectorAll('.filter-toggle').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  initCurrentMode();
}

function switchMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+mode).classList.add('active');
  sessionStart=Date.now();
  initCurrentMode();
}

function initCurrentMode(){
  const area=document.getElementById('game-area');
  area.innerHTML='';
  const deck=getActiveDeck();
  if(deck.length===0&&filterMode==='mistakes'){
    area.innerHTML=`<div class="empty-state"><div class="big-emoji">🎉</div><h3>Geen fouten meer!</h3><p>Je hebt alle fout gegane woordjes geleerd!</p><button class="action-btn btn-primary" style="margin-top:16px" onclick="setFilter('all',document.querySelector('.filter-toggle'))">Alle woordjes oefenen</button></div>`;
    return;
  }
  if(currentMode==='flashcard') initFlashcard(deck);
  else if(currentMode==='quiz'||currentMode==='mistakes') initQuiz(deck);
  else if(currentMode==='type') initType(deck);
  else if(currentMode==='match') initMatch(deck);
}

// ===== FLASHCARD =====
function initFlashcard(deck){
  currentDeck=shuffle([...deck]); currentIdx=0; renderFlashcard();
}
function renderFlashcard(){
  const area=document.getElementById('game-area');
  const total=currentDeck.length;
  const [word,def]=currentDeck[currentIdx];
  const pct=(currentIdx/total*100).toFixed(0);
  area.innerHTML=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="flashcard-wrap" onclick="flipCard()" id="fc-wrap">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-label">Woord</div>
          <div class="card-word">${word}</div>
          <div class="card-hint">👆 Klik om de definitie te zien</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Definitie</div>
          <div class="card-def">${def}</div>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="nav-btn" onclick="fcNav(-1)" ${currentIdx===0?'disabled':''}>◀</button>
      <span class="card-counter">${currentIdx+1} / ${total}</span>
      <button class="nav-btn" onclick="fcNav(1)" ${currentIdx===total-1?'disabled':''}>▶</button>
    </div>
    <div class="flashcard-actions">
      <button class="action-btn btn-wrong" onclick="markWrong('${esc(word)}')">❌ Weet ik niet</button>
      <button class="action-btn btn-right" onclick="markRight('${esc(word)}')">✅ Weet ik!</button>
    </div>`;
}
function flipCard(){ document.getElementById('flashcard').classList.toggle('flipped'); }
function fcNav(dir){ currentIdx=Math.max(0,Math.min(currentDeck.length-1,currentIdx+dir)); renderFlashcard(); }
function markWrong(word){ mistakes.add(word); learned.delete(word); recordWordResult(word,false); saveState(); if(currentIdx<currentDeck.length-1){currentIdx++;renderFlashcard();}else{recordSession('flashcard',learned.size,currentDeck.length);showResult('flashcard');} }
function markRight(word){ learned.add(word); mistakes.delete(word); recordWordResult(word,true); saveState(); if(currentIdx<currentDeck.length-1){currentIdx++;renderFlashcard();}else{recordSession('flashcard',learned.size,currentDeck.length);showResult('flashcard');} }

// ===== QUIZ =====
function initQuiz(deck){ currentDeck=shuffle([...deck]); currentIdx=0; quizScore=0; quizTotal=currentDeck.length; renderQuiz(); }
function renderQuiz(){
  if(currentIdx>=currentDeck.length){ recordSession(currentMode,quizScore,quizTotal); showResult('quiz'); return; }
  const area=document.getElementById('game-area');
  const [word,def]=currentDeck[currentIdx];
  const pct=(currentIdx/currentDeck.length*100).toFixed(0);
  let opts=[word];
  shuffle([...WORDS].filter(w=>w[0]!==word)).slice(0,3).forEach(w=>opts.push(w[0]));
  shuffle(opts);
  area.innerHTML=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-question">
      <div class="q-label">Wat is de definitie van…</div>
      <div class="q-text" style="font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;">${word}</div>
    </div>
    <div class="section-label">Kies de juiste definitie:</div>
    <div class="quiz-options">
      ${WORDS.filter(w=>opts.includes(w[0])).sort((a,b)=>opts.indexOf(a[0])-opts.indexOf(b[0])).map(w=>`
        <button class="option-btn" onclick="quizAnswer(this,'${esc(w[0])}','${esc(word)}')">${w[1]}</button>`).join('')}
    </div>
    <div style="text-align:center;color:var(--text-light);font-size:0.85rem;font-weight:600;">Vraag ${currentIdx+1} van ${currentDeck.length} · Score: ${quizScore}/${currentIdx}</div>`;
}
function quizAnswer(btn,chosen,correct){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  btn.classList.add(ok?'correct':'wrong');
  if(ok){ quizScore++; learned.add(correct); mistakes.delete(correct); }
  else { mistakes.add(correct); learned.delete(correct);
    document.querySelectorAll('.option-btn').forEach(b=>{ const m=WORDS.find(w=>w[1].trim()===b.textContent.trim()); if(m&&m[0]===correct) b.classList.add('correct'); }); }
  recordWordResult(correct,ok); saveState();
  setTimeout(()=>{ currentIdx++; renderQuiz(); },1200);
}

// ===== TYPE =====
function initType(deck){ typeDeck=shuffle([...deck]); typeIdx=0; typeScore=0; renderType(); }
function renderType(){
  if(typeIdx>=typeDeck.length){ recordSession('type',typeScore,typeDeck.length); showResult('type'); return; }
  const area=document.getElementById('game-area');
  const [word,def]=typeDeck[typeIdx];
  const pct=(typeIdx/typeDeck.length*100).toFixed(0);
  area.innerHTML=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-question">
      <div class="q-label">Typ het woord bij deze definitie</div>
      <div class="q-text">${def}</div>
    </div>
    <div class="type-input-wrap">
      <input class="type-input" id="type-inp" placeholder="Typ het woord..." autocomplete="off" onkeydown="if(event.key==='Enter')checkType('${esc(word)}')">
      <button class="type-submit" onclick="checkType('${esc(word)}')">Controleer ✓</button>
    </div>
    <div id="type-feedback" style="min-height:30px;text-align:center;font-weight:700;font-size:0.95rem;"></div>
    <div style="text-align:center;color:var(--text-light);font-size:0.85rem;font-weight:600;margin-top:8px;">Vraag ${typeIdx+1} van ${typeDeck.length}</div>`;
  document.getElementById('type-inp').focus();
}
function norm(s){ return s.trim().toLowerCase().replace(/^(de |het |een )/i,'').replace(/[éèê]/g,'e').replace(/[àâ]/g,'a').replace(/[ùû]/g,'u').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/ç/g,'c'); }
function checkType(correct){
  const inp=document.getElementById('type-inp'), val=inp.value;
  if(!val.trim()) return;
  const ok=norm(val)===norm(correct)||val.trim().toLowerCase()===correct.toLowerCase();
  inp.disabled=true; document.querySelector('.type-submit').disabled=true;
  inp.classList.add(ok?'correct-input':'wrong-input');
  document.getElementById('type-feedback').innerHTML=ok
    ?`<span style="color:var(--success)">✅ Goed zo!</span>`
    :`<span style="color:var(--danger)">❌ Het juiste antwoord is: <strong>${correct}</strong></span>`;
  if(ok){ typeScore++; learned.add(correct); mistakes.delete(correct); } else { mistakes.add(correct); learned.delete(correct); }
  recordWordResult(correct,ok); saveState();
  setTimeout(()=>{ typeIdx++; renderType(); },1600);
}

// ===== MATCH =====
function initMatch(deck){
  matchPairs=shuffle([...deck]).slice(0,Math.min(6,deck.length));
  matchDone=0; matchSelected=null; renderMatch();
}
function renderMatch(){
  const area=document.getElementById('game-area');
  const words=shuffle(matchPairs.map((p,i)=>({word:p[0],idx:i,type:'word'})));
  const defs =shuffle(matchPairs.map((p,i)=>({def:p[1],idx:i,type:'def'})));
  area.innerHTML=`
    <p style="text-align:center;color:var(--text-light);font-weight:700;margin-bottom:14px;">Koppel elk woord aan de juiste definitie!</p>
    <div class="matching-grid">
      <div class="match-col">${words.map(w=>`<button class="match-item word-item" id="mw-${w.idx}" data-idx="${w.idx}" data-type="word" onclick="matchClick(this)">${w.word}</button>`).join('')}</div>
      <div class="match-col">${defs.map(d=>`<button class="match-item def-item" id="md-${d.idx}" data-idx="${d.idx}" data-type="def" onclick="matchClick(this)">${d.def}</button>`).join('')}</div>
    </div>
    <div id="match-status" style="text-align:center;font-weight:700;color:var(--text-light);font-size:0.9rem;margin-top:8px;">${matchDone}/${matchPairs.length} gekoppeld</div>`;
}
function matchClick(el){
  if(el.classList.contains('matched')) return;
  if(!matchSelected){ matchSelected=el; el.classList.add('selected'); return; }
  if(matchSelected.dataset.type===el.dataset.type){ matchSelected.classList.remove('selected'); matchSelected=el; el.classList.add('selected'); return; }
  const a=parseInt(matchSelected.dataset.idx), b=parseInt(el.dataset.idx);
  matchSelected.classList.remove('selected');
  if(a===b){
    matchSelected.classList.add('matched'); el.classList.add('matched');
    matchSelected.disabled=true; el.disabled=true; matchDone++;
    learned.add(matchPairs[a][0]); mistakes.delete(matchPairs[a][0]);
    recordWordResult(matchPairs[a][0],true); saveState();
    document.getElementById('match-status').textContent=`${matchDone}/${matchPairs.length} gekoppeld`;
    matchSelected=null;
    if(matchDone===matchPairs.length) setTimeout(()=>{ recordSession('match',matchPairs.length,matchPairs.length); showResult('match'); },600);
  } else {
    matchSelected.classList.add('wrong-match'); el.classList.add('wrong-match');
    mistakes.add(matchPairs[b][0]); recordWordResult(matchPairs[b][0],false); saveState();
    const ma=matchSelected, mb=el;
    setTimeout(()=>{ ma.classList.remove('wrong-match'); mb.classList.remove('wrong-match'); },600);
    matchSelected=null;
  }
}

// ===== RESULT =====
function showResult(mode){
  const area=document.getElementById('game-area');
  let score,total,emoji,title,sub;
  if(mode==='flashcard'){ score=learned.size; total=currentDeck.length; emoji='🃏'; title='Alle kaartjes gedaan!'; sub=`Je kende ${score} van de ${total} woordjes.`; }
  else if(mode==='quiz'||mode==='mistakes'){ score=quizScore; total=quizTotal; const p=Math.round(score/total*100); emoji=p>=80?'🏆':p>=50?'👍':'💪'; title=p>=80?'Geweldig!':p>=50?'Goed bezig!':'Blijven oefenen!'; sub=`Je had ${score} van de ${total} vragen goed (${p}%)`; }
  else if(mode==='type'){ score=typeScore; total=typeDeck.length; const p=Math.round(score/total*100); emoji=p>=80?'🏆':p>=50?'👍':'💪'; title=p>=80?'Waanzinnig!':p>=50?'Goed gedaan!':'Nog even oefenen!'; sub=`Je typte ${score} van de ${total} woordjes goed (${p}%)`; }
  else if(mode==='match'){ emoji='🧩'; title='Alle woordjes gekoppeld!'; score=matchPairs.length; total=matchPairs.length; sub=`Goed gedaan! Je hebt alle ${total} koppels gevonden.`; }
  area.innerHTML=`
    <div class="result-screen">
      <div class="trophy">${emoji}</div>
      <h2>${title}</h2>
      <div class="score-big">${score}/${total}</div>
      <p style="margin-top:8px">${sub}</p>
      ${mistakes.size>0?`<p style="color:var(--danger);font-size:0.9rem;margin-top:8px">Je hebt nog <strong>${mistakes.size}</strong> fout gegane woordjes.</p>`:'<p style="color:var(--success);font-weight:800;margin-top:8px">🎉 Je hebt geen fouten meer!</p>'}
      <div class="result-actions">
        <button class="action-btn btn-primary" onclick="initCurrentMode()">Opnieuw 🔄</button>
        ${mistakes.size>0?`<button class="action-btn btn-wrong" onclick="switchMode('mistakes')">Oefen fouten 🔁</button>`:''}
        <button class="action-btn btn-secondary" onclick="switchMode('flashcard')">Flashcards 🃏</button>
      </div>
    </div>`;
}

let dashTab='overview';

function closeParent(){ document.getElementById('parent-overlay').classList.remove('show'); }

      <p>De standaard pincode is <strong>1234</strong>. Pas het aan in de code (zoek naar <code>const PIN</code>).</p>

function pinPress(n){
  if(pinBuffer.length>=4) return;
  pinBuffer+=n;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(pinSubmit,200);
}
function pinDel(){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd-'+i);
    if(d) d.classList.toggle('filled', i<pinBuffer.length);
  }
}
function pinSubmit(){
  if(pinBuffer===PIN) renderDashboard();
  else {
    document.getElementById('pin-err').innerHTML=`<p class="pin-error">Verkeerde pincode, probeer opnieuw.</p>`;

}

function renderOverview(){
  const totalSessions=sessions.length;
  const totalAnswers=Object.values(wordStats).reduce((s,w)=>s+w.correct+w.wrong,0);
  const totalCorrect=Object.values(wordStats).reduce((s,w)=>s+w.correct,0);
  const pct=totalAnswers>0?Math.round(totalCorrect/totalAnswers*100):0;
  const learnedCount=learned.size;
  const hardWords=WORDS.filter(w=>wordStats[w[0]]&&wordStats[w[0]].wrong>wordStats[w[0]].correct&&wordStats[w[0]].wrong>0);
  const lastSession=sessions[0];
  const streak=calcStreak();
  const totalTime=sessions.reduce((s,se)=>s+(se.duration||0),0);
  const mins=Math.floor(totalTime/60), secs=totalTime%60;

  return `
    <div class="dash-grid">
      <div class="dash-card blue"><div class="dc-val">${totalSessions}</div><div class="dc-label">Oefensessies</div></div>

      <div class="dash-card orange"><div class="dc-val">${streak}</div><div class="dc-label">Dagen op rij</div></div>
      <div class="dash-card blue"><div class="dc-val">${mins}m ${secs}s</div><div class="dc-label">Totale oefentijd</div></div>
    </div>

    ${lastSession?`
    <div class="dash-section-title">⏱ Laatste sessie</div>
    <div class="session-row" style="margin-bottom:20px">
      <span class="session-mode-badge badge-${lastSession.mode}">${modeLabel(lastSession.mode)}</span>
      <div class="session-info">
        <div class="si-time">${formatDate(lastSession.ts)} · ${lastSession.duration||0}s</div>
        <div class="si-score">${lastSession.score} van ${lastSession.total} goed</div>
      </div>
      <div class="session-score-bar"><div class="session-score-fill" style="width:${lastSession.total>0?Math.round(lastSession.score/lastSession.total*100):0}%"></div></div>
    </div>`:''}

    ${hardWords.length>0?`
    <div class="dash-section-title">😅 Moeilijkste woorden</div>
    <table class="word-table">
      <tr><th>Woord</th><th>Goed</th><th>Fout</th></tr>
      ${hardWords.sort((a,b)=>(wordStats[b[0]].wrong-wordStats[b[0]].correct)-(wordStats[a[0]].wrong-wordStats[a[0]].correct)).slice(0,8).map(w=>`
        <tr>
          <td class="wt-word">${w[0]}</td>
          <td style="color:var(--success);font-weight:800">${wordStats[w[0]].correct}✓</td>
          <td style="color:var(--danger);font-weight:800">${wordStats[w[0]].wrong}✗</td>
        </tr>`).join('')}
    </table>`:`<div style="text-align:center;padding:20px;color:var(--success);font-weight:800">🎉 Geen moeilijke woorden gevonden!</div>`}`;
}

function renderSessions(){
  if(sessions.length===0) return `<div class="empty-state"><div class="big-emoji">📅</div><h3>Nog geen sessies</h3><p>Er zijn nog geen oefensessies opgeslagen.</p></div>`;
  return `
    <div class="dash-section-title">📅 Alle oefensessies (${sessions.length})</div>
    <div class="sessions-list">
      ${sessions.map(s=>`
        <div class="session-row">
          <span class="session-mode-badge badge-${s.mode}">${modeLabel(s.mode)}</span>
          <div class="session-info">
            <div class="si-time">${formatDate(s.ts)} · ${s.duration||0} seconden</div>
            <div class="si-score">${s.score} van ${s.total} goed (${s.total>0?Math.round(s.score/s.total*100):0}%)</div>
          </div>
          <div class="session-score-bar"><div class="session-score-fill" style="width:${s.total>0?Math.round(s.score/s.total*100):0}%"></div></div>
        </div>`).join('')}
    </div>`;
}

function renderWords(){
  return `
    <div class="dash-section-title">📝 Alle woordjes</div>
    <table class="word-table">
      <tr><th>Woord</th><th>Goed/Fout</th><th>Score</th><th>Status</th></tr>
      ${WORDS.map(w=>{
        const st=wordStats[w[0]]||{correct:0,wrong:0};
        const total=st.correct+st.wrong;
        const pct=total>0?Math.round(st.correct/total*100):null;
        const isLearned=learned.has(w[0]);
        const isMistake=mistakes.has(w[0]);
        const statusClass=total===0?'status-new':isMistake?'status-hard':'status-ok';
        const statusText=total===0?'Nieuw':isMistake?'Oefenen':'Geleerd';
        const barColor=pct===null?'#ccc':pct>=70?'var(--success)':pct>=40?'var(--accent)':'var(--danger)';
        return `<tr>
          <td class="wt-word">${w[0]}</td>
          <td><span style="color:var(--success);font-weight:700">${st.correct}✓</span> <span style="color:var(--danger);font-weight:700">${st.wrong}✗</span></td>
          <td>
            ${pct!==null?`<div style="display:flex;align-items:center;gap:6px"><div class="wt-bar-wrap"><div class="wt-bar" style="width:${pct}%;background:${barColor}"></div></div><span style="font-size:0.78rem;font-weight:700">${pct}%</span></div>`:'<span style="color:#bbb;font-size:0.78rem">—</span>'}
          </td>
          <td><span class="wt-status ${statusClass}">${statusText}</span></td>
        </tr>`;
      }).join('')}
    </table>`;
}

function calcStreak(){
  if(sessions.length===0) return 0;
  const days=new Set(sessions.map(s=>new Date(s.ts).toDateString()));
  let streak=0, d=new Date();
  while(days.has(d.toDateString())){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function formatDate(ts){
  const d=new Date(ts);
  const now=new Date();
  const diffMs=now-d;
  const diffMin=Math.floor(diffMs/60000);
  if(diffMin<1) return 'zojuist';
  if(diffMin<60) return `${diffMin} min geleden`;
  if(diffMin<1440) return `${Math.floor(diffMin/60)}u geleden`;
  return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function modeLabel(m){
  return {flashcard:'🃏 Flashcard',quiz:'🧠 Quiz',type:'✍️ Typen',match:'🧩 Koppelen',mistakes:'🔁 Fouten'}[m]||m;
}

function resetData(){
  if(!confirm('Weet je zeker dat je alle voortgang wilt wissen?')) return;
  localStorage.removeItem('wl_mistakes'); localStorage.removeItem('wl_learned');
  localStorage.removeItem('wl_wordstats'); localStorage.removeItem('wl_sessions');
  mistakes=new Set(); learned=new Set(); wordStats={}; sessions=[];
  updateStats(); renderDashboard();
}

function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

// INIT
updateStats();
initCurrentMode();
</script>
</body>
</html>
